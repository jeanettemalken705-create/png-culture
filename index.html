  <style>
    /* Basic reset and typography */
    * {
      box-sizing: border-box;

    .card h2 {

      margin-bottom: 0.5rem;
    }
    .note {
      margin-top: 2rem;

      color: #555;
    }
    .action {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #007BFF;
